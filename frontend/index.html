<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Productos</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">&#128230;</span>
        <h1>Gestión de Productos</h1>
      </div>
      <span class="badge">SurrealDB &middot; Go</span>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Agregar Producto</h2>
      <form id="form-producto">
        <div class="field-row">
          <div class="field">
            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" placeholder="ej: Laptop Pro" required />
          </div>
          <div class="field field--small">
            <label for="precio">Precio ($)</label>
            <input id="precio" type="number" placeholder="0.00" step="0.01" min="0" required />
          </div>
          <button type="submit" class="btn btn-primary">Agregar</button>
        </div>
        <p id="form-error" class="error-msg hidden"></p>
      </form>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Productos</h2>
        <span id="product-count" class="count-badge"></span>
      </div>
      <p id="state-loading" class="state-msg">Cargando...</p>
      <p id="state-empty"   class="state-msg hidden">No hay productos todavía.</p>
      <p id="state-error"   class="state-msg error-msg hidden"></p>
      <table id="tabla" class="hidden">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </section>
  </main>

  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <h3>Editar Producto</h3>
      <form id="form-editar">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label for="edit-nombre">Nombre</label>
          <input id="edit-nombre" type="text" required />
        </div>
        <div class="field">
          <label for="edit-precio">Precio ($)</label>
          <input id="edit-precio" type="number" step="0.01" min="0" required />
        </div>
        <p id="edit-error" class="error-msg hidden"></p>
        <div class="modal-actions">
          <button type="button" id="btn-cancelar" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="alert"></div>

  <script src="/app.js"></script>
</body>
</html>
